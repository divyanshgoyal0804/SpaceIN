  <path d="M110 750C340 690 1260 690 1490 750V910H110V750Z" fill="#08111F"/>
  <path d="M110 750C340 700 1260 700 1490 750" stroke="#25324C" stroke-width="2" opacity="0.6"/>
  <path d="M145 800C360 760 1240 760 1455 800" stroke="#1F2B42" stroke-width="2" opacity="0.6"/>

  <!-- desk cluster -->
  <g>
