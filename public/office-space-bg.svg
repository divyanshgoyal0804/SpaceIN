<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="800" y1="0" x2="800" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.46" stop-color="#0E1728"/>
      <stop offset="1" stop-color="#050B14"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172238"/>
      <stop offset="1" stop-color="#0F1A2C"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop stop-color="#24324E"/>
      <stop offset="1" stop-color="#121B2D"/>
    </linearGradient>
    <radialGradient id="lampGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1220 260) rotate(90) scale(210 270)">
      <stop stop-color="#7DD3FC" stop-opacity="0.24"/>
      <stop offset="0.55" stop-color="#38BDF8" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur20" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect x="0" y="0" width="1600" height="1000" fill="url(#lampGlow)"/>
  <circle cx="1220" cy="230" r="120" fill="#38BDF8" fill-opacity="0.12" filter="url(#blur20)"/>
  <circle cx="380" cy="180" r="180" fill="#2563EB" fill-opacity="0.08" filter="url(#blur20)"/>

  <!-- back wall -->
  <rect x="110" y="110" width="1380" height="640" rx="28" fill="#0C1525" fill-opacity="0.92"/>
  <rect x="160" y="160" width="510" height="300" rx="18" fill="url(#panel)"/>
  <rect x="720" y="160" width="560" height="300" rx="18" fill="#111B2E"/>
  <rect x="1320" y="160" width="120" height="300" rx="18" fill="#10182A"/>

  <!-- windows -->
  <rect x="214" y="210" width="120" height="150" rx="10" fill="#0A1424" stroke="#2D3C59" stroke-width="2"/>
  <rect x="354" y="210" width="120" height="150" rx="10" fill="#0A1424" stroke="#2D3C59" stroke-width="2"/>
  <rect x="494" y="210" width="120" height="150" rx="10" fill="#0A1424" stroke="#2D3C59" stroke-width="2"/>
  <path d="M214 245H614" stroke="#2D3C59" stroke-width="2" opacity="0.7"/>
  <path d="M214 285H614" stroke="#2D3C59" stroke-width="2" opacity="0.45"/>
  <path d="M214 325H614" stroke="#2D3C59" stroke-width="2" opacity="0.35"/>
  <path d="M274 210V360M414 210V360M554 210V360" stroke="#2D3C59" stroke-width="2" opacity="0.75"/>

  <!-- wall boards / frames -->
  <rect x="760" y="205" width="170" height="100" rx="12" fill="#0F1A2D" stroke="#31415E" stroke-width="2"/>
  <rect x="950" y="185" width="130" height="140" rx="12" fill="#0F1A2D" stroke="#31415E" stroke-width="2"/>
  <rect x="1100" y="205" width="220" height="100" rx="12" fill="#0F1A2D" stroke="#31415E" stroke-width="2"/>
  <path d="M790 235H900M790 260H878" stroke="#6B7A99" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <path d="M980 225H1050M980 250H1040M980 275H1030" stroke="#6B7A99" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
  <path d="M1140 235H1280M1140 260H1260" stroke="#6B7A99" stroke-width="6" stroke-linecap="round" opacity="0.4"/>

