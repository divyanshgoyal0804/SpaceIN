  <g>
    <rect x="1140" y="92" width="4" height="88" rx="2" fill="#4B5E7C"/>
    <rect x="1085" y="108" width="4" height="72" rx="2" fill="#4B5E7C"/>
    <rect x="1228" y="100" width="4" height="80" rx="2" fill="#4B5E7C"/>
    <ellipse cx="1142" cy="190" rx="42" ry="12" fill="#9EDBFF" fill-opacity="0.12"/>
    <ellipse cx="1087" cy="188" rx="34" ry="10" fill="#9EDBFF" fill-opacity="0.10"/>
    <ellipse cx="1230" cy="190" rx="36" ry="11" fill="#9EDBFF" fill-opacity="0.12"/>
