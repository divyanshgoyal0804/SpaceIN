    <rect x="410" y="588" width="28" height="150" rx="8" fill="#182338"/>
    <rect x="1042" y="588" width="28" height="150" rx="8" fill="#182338"/>
    <rect x="480" y="520" width="460" height="52" rx="18" fill="#152033" stroke="#2C3A57" stroke-width="2"/>
    <rect x="528" y="534" width="95" height="18" rx="9" fill="#1F2E49"/>
    <rect x="644" y="534" width="95" height="18" rx="9" fill="#1F2E49"/>
    <rect x="760" y="534" width="95" height="18" rx="9" fill="#1F2E49"/>
  </g>

  <!-- chairs -->
  <g opacity="0.95">
    <rect x="510" y="610" width="84" height="120" rx="20" fill="#111A2C" stroke="#32415F" stroke-width="2"/>
    <rect x="676" y="610" width="84" height="120" rx="20" fill="#111A2C" stroke="#32415F" stroke-width="2"/>
    <rect x="842" y="610" width="84" height="120" rx="20" fill="#111A2C" stroke="#32415F" stroke-width="2"/>
    <rect x="540" y="720" width="24" height="78" rx="8" fill="#172033"/>
    <rect x="706" y="720" width="24" height="78" rx="8" fill="#172033"/>
    <rect x="872" y="720" width="24" height="78" rx="8" fill="#172033"/>
  </g>

  <!-- monitors -->
  <g>
    <rect x="580" y="472" width="104" height="64" rx="10" fill="#0B1422" stroke="#2B3955" stroke-width="2"/>
    <rect x="588" y="480" width="88" height="48" rx="8" fill="#0F2740"/>
    <rect x="708" y="472" width="104" height="64" rx="10" fill="#0B1422" stroke="#2B3955" stroke-width="2"/>
    <rect x="716" y="480" width="88" height="48" rx="8" fill="#113153"/>
    <rect x="836" y="472" width="104" height="64" rx="10" fill="#0B1422" stroke="#2B3955" stroke-width="2"/>
    <rect x="844" y="480" width="88" height="48" rx="8" fill="#0F2740"/>
  </g>

  <!-- plant and side details -->
  <g>
    <rect x="210" y="610" width="80" height="130" rx="18" fill="#101A2A" stroke="#2B3955" stroke-width="2"/>
    <path d="M240 610C228 590 222 566 234 544C252 558 264 580 266 610" fill="#2563EB" fill-opacity="0.28"/>
    <path d="M246 610C252 578 270 554 294 544C300 574 292 598 278 610" fill="#0EA5E9" fill-opacity="0.22"/>
    <path d="M252 610C264 586 286 570 314 568C308 596 292 610 274 618" fill="#38BDF8" fill-opacity="0.18"/>
  </g>

  <!-- foreground blur/overlay shapes -->
  <ellipse cx="800" cy="960" rx="560" ry="90" fill="#020817" fill-opacity="0.65"/>
  <rect y="0" width="1600" height="1000" fill="url(#sky)" fill-opacity="0.15"/>
</svg>
